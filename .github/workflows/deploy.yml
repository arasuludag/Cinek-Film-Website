name: Build & Deploy to cPanel

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Fired by a Sanity webhook on publish so client edits go live automatically.
  # Setup: Sanity → API → Webhooks → POST https://api.github.com/repos/<owner>/<repo>/dispatches
  # Body: {"event_type":"sanity-publish"}, Auth: Bearer <GitHub PAT with Actions:write>
  repository_dispatch:
    types: [sanity-publish]

# Cancel an in-progress deploy if a newer one arrives.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Astro image builds
        uses: actions/cache@v4
        with:
          path: node_modules/.astro
          key: astro-images-${{ secrets.PUBLIC_SANITY_PROJECT_ID }}

      - name: Install dependencies
        run: npm ci

      - name: Build (Astro static)
        run: npm run build
        env:
          PUBLIC_SANITY_PROJECT_ID: ${{ secrets.PUBLIC_SANITY_PROJECT_ID }}
          PUBLIC_SANITY_DATASET: production

      - name: Deploy to cPanel via FTP
        env:
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
        run: |
          sudo apt-get install -y lftp
          lftp -e "
            set ftp:passive-mode true;
            set ftp:use-epsv false;
            set ftp:ssl-allow false;
            set net:timeout 60;
            set net:max-retries 3;
            set net:reconnect-interval-base 5;
            set mirror:parallel-transfer-count 8;
            set mirror:parallel-directories true;
            set mirror:use-pget-n 4;
            open ftp://$FTP_HOST;
            user $FTP_USER $FTP_PASS;
            mirror --reverse --delete --ignore-time --verbose=1 --exclude='.ftp-deploy-sync-state.json' ./dist/ /public_html/;
            quit
          " 2>&1
